{% load static %}
<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}GT Project{% endblock %}</title>

  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  {% block extra_css %}{% endblock %}
</head>

<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">GT Project</div>

      {% if request.user.is_authenticated %}
      <nav class="topnav">
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'waiting_dryroom_page' %}">Waiting Dry Room</a>
        <a href="{% url 'waiting_folding_page' %}">Waiting Folding</a>
        <a href="{% url 'dryroom_transaction_page' %}">Dry Room</a>
        <a href="{% url 'folding_transaction_page' %}">Folding</a>
        <a href="{% url 'logout' %}">Logout</a>
      </nav>
      {% endif %}
    </div>
  </header>

  <main class="app-main">
    {% block content %}{% endblock %}
  </main>

  <script src="{% static 'js/base.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>

</html>
