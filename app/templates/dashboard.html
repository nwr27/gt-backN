<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      padding: 40px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 10px;
      max-width: 700px;
      margin: auto;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.1);
    }

    a {
      display: inline-block;
      margin-top: 20px;
      color: #1f6feb;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Selamat datang, {{ request.user.username }}</h1>
    <p>Login Django sederhana sudah berhasil.</p>
    <a href="/logout/">Logout</a>
  </div>
</body>

</html>
