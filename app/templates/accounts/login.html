{% load static %}
<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Login GT Project</title>
  <link rel="stylesheet" type="text/css" href="{% static 'css/login.css' %}">
</head>

<body>
  <div class="box">
    <h2>Login</h2>

    {% if form.errors %}
    <p class="error">Username atau password salah.</p>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label>Username</label>
      {{ form.username }}
      <label>Password</label>
      {{ form.password }}
      <button type="submit">Masuk</button>
    </form>
  </div>
</body>

</html>
