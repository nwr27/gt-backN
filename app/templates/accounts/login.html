{% extends "base/base.html" %}
{% load static %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="box">
  <h2>Login</h2>

  {% if form.errors %}
  <p class="error">Username atau password salah.</p>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <label>Username</label>
    {{ form.username }}
    <label>Password</label>
    {{ form.password }}
    <button type="submit">Masuk</button>
  </form>
</div>
{% endblock %}
