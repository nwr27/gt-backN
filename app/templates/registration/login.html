<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Login GT Project</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #fff;
      padding: 30px;
      width: 350px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0 15px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: 0;
      background: #1f6feb;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .error {
      color: red;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>Login</h2>

    {% if form.errors %}
    <p class="error">Username atau password salah.</p>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label>Username</label>
      {{ form.username }}
      <label>Password</label>
      {{ form.password }}
      <button type="submit">Masuk</button>
    </form>
  </div>
</body>

</html>
